<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Diary App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="listScreen">
      <div id="today"></div>

      <div id="monthLabel">
        <button id="prevMonth" class="monthArrow">←</button>
        <div id="yearMonth">2025年7月</div>
        <button id="nextMonth" class="monthArrow">→</button>
      </div>

      <!-- スクロールするエリア -->
      <div id="scrollArea">
        <div id="list"></div>
      </div>

      <!-- 固定表示のボタン -->
      <div>
        <button id="editButton">EditToday</button>
      </div>
    </div>

    <!-- 編集画面 -->
    <div id="editorScreen" style="display: none">
      <header id="editorHeader"></header>
      <div id="editArea">
        <textarea id="textInput" maxlength="45"></textarea><br />
        <!-- 保存ボタン -->
        <div class="save-button-wrapper">
          <button id="saveButton">SAVE</button>
        </div>
      </div>

      <!-- 戻るボタン -->
      <div class="button-container">
        <button id="backButton">BACK</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
