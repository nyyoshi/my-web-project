<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Diary App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="listScreen">
      <div id="today"></div>

      <div id="monthLabel">
        <span id="yearMonth"></span>
      </div>

      <!-- スクロールするエリア -->
      <div id="scrollArea">
        <div id="list"></div>
      </div>

      <!-- 固定表示のボタン -->
      <button id="editButton" class="fixed-button fixed-button--silver">
        EditToday
      </button>
    </div>

    <!-- 編集画面 -->
    <div id="editorScreen">
      <header id="editorHeader">
        <div class="headerContent"></div>
      </header>
      <div id="editArea">
        <textarea id="textInput" maxlength="50"></textarea>
        <!-- 保存ボタン -->
        <div class="save-button-wrapper">
          <!-- 残り文字数カウンター -->
          <div id="counter">50</div>
          <button id="saveButton">SAVE</button>
        </div>
      </div>

      <!-- 戻るボタン -->
      <div class="button-container">
        <button id="backButton" class="fixed-button fixed-button--dark">
          BACK
        </button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
